name: Build and Scan Voting App Images

on:
  push:
    branches:
      - feature/sysdig-build-scan

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: vote
            context: ./vote
            dockerfile: ./vote/Dockerfile
            image: voting-app-vote:gha
          - app: result
            context: ./result
            dockerfile: ./result/Dockerfile
            image: voting-app-result:gha
          - app: worker
            context: ./worker
            dockerfile: ./worker/Dockerfile
            image: voting-app-worker:gha

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.app }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.image }}
          platforms: linux/amd64

      - name: Scan ${{ matrix.app }} image with Sysdig
        uses: sysdiglabs/scan-action@v6
        with:
          image-tag: ${{ matrix.image }}
          sysdig-secure-token: ${{ secrets.SYSDIG_SECURE_TOKEN }}
          sysdig-secure-url: ${{ secrets.SYSDIG_SECURE_URL }}
          stop-on-processing-error: true
          stop-on-failed-policy-eval: false
          severity-at-least: medium
